<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ink Layers — 색분해 퍼즐</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(120% 90% at 50% 16%,#7fb0bd 0%,#5c93a1 60%,#4e818e 100%);}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;}
  #top{margin-top:12px;display:flex;flex-direction:column;align-items:center;gap:3px;}
  #stageName{color:#eaf6f4;font-weight:800;font-size:18px;}
  #stageNo{color:#cfe6e1;font-size:12px;font-weight:700;opacity:.85;}
  .stars{display:flex;gap:7px;margin-top:5px;}
  .stars b{font-size:24px;color:#bcd3cf;}.stars b.on{color:#ffc534;text-shadow:0 2px 0 #e0921f;}
  #target{margin-top:9px;text-align:center;}
  #target .lab{color:#eaf6f4;font-size:11px;font-weight:700;opacity:.8;margin-bottom:3px;letter-spacing:.5px;}
  #tcv{width:138px;height:138px;border-radius:16px;background:#fff;box-shadow:0 8px 16px rgba(0,0,0,.22),inset 0 0 0 3px rgba(0,0,0,.05);}
  #boardWrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;}
  #board{width:320px;height:320px;border-radius:28px;background:#fff;box-shadow:0 16px 32px rgba(0,0,0,.26),inset 0 0 0 4px rgba(0,0,0,.05);}
  #hint{color:#dcefe9;font-size:12px;opacity:.85;font-weight:600;margin:-2px 0 6px;text-align:center;padding:0 18px;}
  #tray{display:flex;gap:11px;margin-bottom:12px;flex-wrap:wrap;justify-content:center;padding:0 12px;max-width:430px;}
  .ink{width:60px;height:74px;border-radius:15px;background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:transform .1s;}
  .ink:active{transform:scale(.9);}
  .ink .dot{width:34px;height:34px;border-radius:50%;box-shadow:inset 0 -3px 6px rgba(0,0,0,.15),0 2px 5px rgba(0,0,0,.2);}
  .ink .nm{color:#fff;font-size:10px;font-weight:800;}
  .ink.used{opacity:.4;}.ink.used .nm::after{content:' ✓';}
  #bar{display:flex;gap:9px;margin-bottom:12px;}
  .btn{padding:10px 20px;border:none;border-radius:20px;font-size:15px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(180deg,#56c294,#2f9e7e);box-shadow:0 5px 0 #237a61;}
  .btn.alt{background:linear-gradient(180deg,#f0a64e,#e0822f);box-shadow:0 5px 0 #b5651f;}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #237a61;}
  #toast{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%) scale(.8);opacity:0;pointer-events:none;z-index:20;background:rgba(40,55,60,.94);color:#fff;font-weight:800;font-size:18px;padding:13px 24px;border-radius:28px;white-space:nowrap;}
  #toast.show{animation:tp 1.2s ease forwards;}
  @keyframes tp{0%{opacity:0;transform:translate(-50%,-50%) scale(.8);}14%{opacity:1;transform:translate(-50%,-60%) scale(1.05);}24%{transform:translate(-50%,-62%) scale(1);}76%{opacity:1;}100%{opacity:0;transform:translate(-50%,-72%) scale(.95);}}
  #win{position:fixed;inset:0;background:rgba(20,30,30,.6);display:none;align-items:center;justify-content:center;z-index:30;}
  #win.show{display:flex;}
  #winCard{background:linear-gradient(180deg,#fffef9,#fff5e9);border-radius:32px;padding:24px 32px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.4);}
  #winCard img{width:150px;height:150px;border-radius:16px;background:#fff;box-shadow:inset 0 0 0 3px rgba(0,0,0,.05);margin-bottom:8px;}
  #winCard h2{color:#2f9e7e;font-size:26px;margin:2px 0;}
  #winCard p{color:#7a8a86;font-weight:700;margin-bottom:12px;}
  #winCard .stars b{font-size:40px;}
</style></head>
<body>
<div id="wrap">
  <div id="top"><div id="stageName">색을 만들어 그림 완성</div><div id="stageNo">잉크를 겹쳐 목표 그림과 똑같이</div><div class="stars" id="starbar"></div></div>
  <div id="target"><div class="lab">목표 (TARGET)</div><canvas id="tcv" width="300" height="300"></canvas></div>
  <div id="boardWrap"><canvas id="board" width="600" height="600"></canvas></div>
  <div id="hint">목표 색을 보고 어떤 잉크가 섞였는지 추론하세요. 초록=노랑+청록, 주황=노랑+마젠타…</div>
  <div id="tray"></div>
  <div id="bar"><button class="btn alt" id="undo">↩ 되돌리기</button><button class="btn alt" id="reset">처음부터</button></div>
</div>
<div id="toast"></div>
<div id="win"><div id="winCard"><img id="winImg"><div class="stars" id="winStars"></div><h2 id="winTitle"></h2><p id="winSub"></p><button class="btn" id="again">다시</button></div></div>

<script>
const $=s=>document.querySelector(s);
const IMG={}; let loaded=0; const need=Object.keys(ASSETS).length;
for(const k in ASSETS){ const im=new Image(); im.onload=()=>{ IMG[k]=im; if(++loaded===need) start(); }; im.src=ASSETS[k]; }
// 3 real inks (with hidden separation masks) + 3 decoy inks (full-silhouette mask, wrong colours) = traps
const INKS=[
  {id:'Y',nm:'Yellow', col:[255,221,51], mask:'Y'},
  {id:'C',nm:'Cyan',   col:[64,201,224], mask:'C'},
  {id:'M',nm:'Magenta',col:[232,70,150], mask:'M'},
  {id:'L',nm:'Lime',   col:[150,220,70], mask:'ALL'},
  {id:'O',nm:'Coral',  col:[240,120,95], mask:'ALL'},
  {id:'S',nm:'Slate',  col:[95,105,125], mask:'ALL'},
];
const SOL=['Y','C','M'];
const S=600; let applied=[], mistakes=0, order=[];
const board=$('#board'), bx=board.getContext('2d'), tcv=$('#tcv'), tx=tcv.getContext('2d');
const cache={};
function stamp(ink){ if(cache[ink.id])return cache[ink.id]; const c=document.createElement('canvas'); c.width=S;c.height=S; const g=c.getContext('2d');
  g.fillStyle=`rgb(${ink.col.join(',')})`; g.fillRect(0,0,S,S); g.globalCompositeOperation='destination-in'; g.drawImage(IMG[ink.mask],0,0,S,S); cache[ink.id]=c; return c; }
function redraw(){ bx.globalCompositeOperation='source-over'; bx.clearRect(0,0,S,S); bx.fillStyle='#fff'; bx.fillRect(0,0,S,S);
  for(const id of applied){ const ink=INKS.find(k=>k.id===id); bx.globalCompositeOperation='multiply'; bx.drawImage(stamp(ink),0,0); }
  bx.globalCompositeOperation='source-over'; }
function buildTray(){ const t=$('#tray'); t.innerHTML='';
  for(const ink of order){ const el=document.createElement('div'); el.className='ink'+(applied.includes(ink.id)?' used':'');
    el.innerHTML=`<div class="dot" style="background:rgb(${ink.col.join(',')})"></div><div class="nm">${ink.nm}</div>`; el.onclick=()=>tap(ink.id); t.appendChild(el); } }
function toast(m){ const e=$('#toast'); e.textContent=m; e.classList.remove('show'); void e.offsetWidth; e.classList.add('show'); }
const stars=()=>Math.max(1,3-mistakes);
function updateStars(){ const c=stars(); $('#starbar').innerHTML=[0,1,2].map(i=>`<b class="${i<c?'on':''}">★</b>`).join(''); }
const setEq=(a,b)=>a.length===b.length&&a.every(x=>b.includes(x));
function tap(id){ if(applied.includes(id))return; applied.push(id);
  if(!SOL.includes(id)){ mistakes++; updateStars(); toast('그 색은 안 들어가요 🙂'); if(navigator.vibrate)navigator.vibrate([10,40,10]); }
  buildTray(); redraw();
  if(setEq(applied,SOL)){ const st=stars(); $('#winImg').src=ASSETS.target;
    $('#winStars').innerHTML=[0,1,2].map(i=>`<b class="${i<st?'on':''}">★</b>`).join('');
    $('#winTitle').textContent= st===3?'Perfect!':'완성!'; $('#winSub').textContent= mistakes===0?'색을 정확히 읽었어요!':`${mistakes}번 잘못 섞음`;
    setTimeout(()=>$('#win').classList.add('show'),420); } }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function reset(){ applied=[]; mistakes=0; $('#win').classList.remove('show'); updateStars(); buildTray(); redraw(); }
function start(){ tx.drawImage(IMG.target,0,0,300,300); order=shuffle([...INKS]); reset(); }
$('#undo').onclick=()=>{ if(!applied.length)return; const id=applied.pop(); if(!SOL.includes(id)&&mistakes>0)mistakes--; updateStars(); buildTray(); redraw(); };
$('#reset').onclick=reset; $('#again').onclick=reset;
window.__qa={ tap:id=>tap(id), state:()=>({applied:[...applied],mistakes,won:$('#win').classList.contains('show')}), inks:()=>INKS.map(i=>i.id), sol:()=>SOL };
</script>
