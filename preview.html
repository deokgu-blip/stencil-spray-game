<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Stencil Spray</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Gaegu:wght@700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;touch-action:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:#cfe3dd;font-family:'Patrick Hand','Gaegu',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  #bgfill{position:fixed;inset:0;z-index:0;background:radial-gradient(120% 90% at 50% 18%,#eaf3ef 0%,#cfe0da 55%,#b9d2ca 100%);background-size:cover;background-position:center;}
  #stageWrap{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;}
  #stage{position:relative;width:1080px;height:1920px;flex:none;transform-origin:center center;}
  /* top bar */
  #starbar{display:none;}   /* healing: no stars / no fail */
  #refBox .rq{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px;font-weight:900;color:#cfd9d6;}
  /* per-placement rating image popup */
  #rating{position:absolute;left:50%;top:540px;transform:translate(-50%,-50%) scale(.5);opacity:0;z-index:42;pointer-events:none;}
  #rating.show{animation:ratePop .9s ease forwards;}
  #rating img{width:460px;height:auto;filter:drop-shadow(0 10px 16px rgba(0,0,0,.28));}
  @keyframes ratePop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4);}18%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}30%{transform:translate(-50%,-50%) scale(1);}75%{opacity:1;transform:translate(-50%,-58%) scale(1);}100%{opacity:0;transform:translate(-50%,-72%) scale(.95);}}
  /* per-STEP rating text — letters pop in left->right with a bouncy boing, art-tone warm sticker look */
  #stepRate{position:fixed;left:50%;top:34%;transform:translateX(-50%);z-index:60;pointer-events:none;display:flex;white-space:nowrap;opacity:1;transition:opacity .35s;}
  #stepRate.fade{opacity:0;}
  #stepRate .rletter{display:inline-block;font-size:min(11vw,82px);font-weight:900;letter-spacing:1px;opacity:0;
    text-shadow:0 4px 0 rgba(255,255,255,.85),0 9px 0 rgba(0,0,0,.12),0 14px 18px rgba(0,0,0,.28);}
  #stepRate.show .rletter{animation:rboing .52s cubic-bezier(.2,1.5,.4,1) forwards;}
  @keyframes rboing{0%{opacity:0;transform:translateY(34px) scale(.25) rotate(-10deg);}55%{opacity:1;transform:translateY(-14px) scale(1.28) rotate(4deg);}100%{opacity:1;transform:translateY(0) scale(1) rotate(0);}}
  /* easel stand behind the tall canvas (legs splay out below the canvas) */
  #easel{position:absolute;left:50%;top:-344px;transform:translateX(-50%);width:1287px;height:auto;z-index:0;pointer-events:none;filter:drop-shadow(0 22px 26px rgba(40,60,60,.24));}
  /* tall PORTRAIT drawing paper resting on the easel — solid white, height follows the canvas aspect */
  #field{position:absolute;top:112px;left:50%;transform:translateX(-50%);width:966px;border-radius:68px;z-index:1;
    background:#fcfaf4;filter:drop-shadow(0 16px 30px rgba(60,80,80,.32));overflow:visible;}
  #paper{display:none;}
  /* the portrait canvas fills the paper width; height auto-matches its aspect */
  #play{position:relative;display:block;width:100%;height:auto;}
  #sprayCan{position:absolute;width:224px;height:276px;object-fit:contain;pointer-events:none;display:none;
    transform:translate(-50%,-50%);z-index:7;filter:drop-shadow(0 10px 12px rgba(0,0,0,.34));}
  /* pinned reference note (top-right of field) */
  #refBox{position:fixed;top:60px;right:3px;width:104px;height:109px;border-radius:12px;background:#fffdf5;z-index:55;
    box-shadow:0 10px 22px rgba(40,60,60,.22),inset 0 0 0 2px rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center;
    overflow:visible;cursor:zoom-in;transform:rotate(3deg);transform-origin:top right;
    transition:transform .2s cubic-bezier(.2,.85,.25,1),box-shadow .2s;}
  #refBox .rinner{position:absolute;inset:0;border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#fffdf5;}
  #refBox img#refImg{width:90%;height:90%;object-fit:contain;margin-top:0;}
  #refBox .rlab{display:none;}   /* no GOAL text on the memo */
  #refPin{position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:38px;height:38px;z-index:3;filter:drop-shadow(0 4px 5px rgba(0,0,0,.28));pointer-events:none;}
  #refBox.zoom{transform:rotate(0deg) scale(3.2);box-shadow:0 26px 60px rgba(0,0,0,.4);cursor:zoom-out;}
  /* bottom controls gathered at the lower-right, just left of the submit check */
  #bottom{position:absolute;left:0;right:0;bottom:96px;height:206px;z-index:5;display:flex;align-items:center;justify-content:flex-start;padding-left:8px;padding-right:200px;}
  #canHint{display:none;}
  /* colour CAROUSEL — swipe/drag horizontally, tap to select; centred colour emphasised */
  #cans{position:relative;flex:1 1 auto;height:198px;overflow:hidden;cursor:grab;}
  #cans:active{cursor:grabbing;}
  #canTrack{position:absolute;left:50%;top:0;height:192px;display:flex;align-items:center;will-change:transform;}
  .can{flex:0 0 158px;height:188px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.5;transform:scale(.74);transition:transform .2s cubic-bezier(.3,.85,.3,1),opacity .2s;}
  .cimg{width:150px;height:150px;object-fit:contain;filter:drop-shadow(0 8px 9px rgba(40,55,55,.36));pointer-events:none;}
  .can.sel{opacity:1;transform:scale(1.18);}
  .can.sel .cimg{filter:drop-shadow(0 13px 15px rgba(40,55,55,.46));}
  /* WIDTH SLIDER + live preview circle */
  #widths{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;}
  #wprev{height:184px;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  #wcirc{border-radius:50%;box-shadow:0 6px 16px rgba(40,60,60,.28),inset 0 5px 12px rgba(255,255,255,.4);border:3px solid rgba(255,255,255,.7);}
  #wslider{-webkit-appearance:none;appearance:none;width:620px;max-width:80%;height:26px;border-radius:14px;background:linear-gradient(90deg,#d3e7e0,#7fceb4);outline:none;cursor:pointer;}
  #wslider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:60px;height:60px;border-radius:50%;background:#fffdf5;border:5px solid #43c08e;box-shadow:0 5px 12px rgba(0,0,0,.28);cursor:pointer;}
  #wslider::-moz-range-thumb{width:60px;height:60px;border-radius:50%;background:#fffdf5;border:5px solid #43c08e;box-shadow:0 5px 12px rgba(0,0,0,.28);cursor:pointer;}
  #doneBtn{display:none;position:absolute;right:40px;bottom:126px;z-index:57;width:140px;height:140px;padding:0;border:none;border-radius:36px;font-size:86px;line-height:140px;font-weight:900;color:#fff;background:linear-gradient(180deg,#5fd0a0,#33a87e);box-shadow:0 10px 0 #237a61,0 16px 22px rgba(40,90,70,.34);cursor:pointer;transition:transform .1s;}
  #doneBtn:active{transform:translateY(6px);box-shadow:0 4px 0 #237a61,0 7px 12px rgba(40,90,70,.3);}
  #msgToast{position:fixed;left:50%;top:50%;z-index:64;pointer-events:none;opacity:0;transform:translate(-50%,-100%) scale(.8);}   /* JS sets left/top to just above the wrong tile */
  #msgToast img{width:182px;height:auto;filter:drop-shadow(0 8px 14px rgba(0,0,0,.24));}
  #msgToast.show{animation:msgPop 1.3s ease forwards;}
  @keyframes msgPop{0%{opacity:0;transform:translate(-50%,-86%) scale(.7);}16%{opacity:1;transform:translate(-50%,-110%) scale(1.06);}28%{transform:translate(-50%,-104%) scale(1);}74%{opacity:1;transform:translate(-50%,-106%) scale(1);}100%{opacity:0;transform:translate(-50%,-118%) scale(.95);}}
  .stars{display:flex;justify-content:center;gap:16px;margin:4px 0 16px;}
  .stars img{width:100px;height:100px;}
  .stars img.off{filter:grayscale(1) brightness(1.3) opacity(.42);}
  #dragLayer{position:fixed;inset:0;z-index:58;pointer-events:none;}
  #dev{position:fixed;left:10px;top:10px;z-index:70;display:flex;align-items:center;gap:8px;font-family:system-ui,sans-serif;}
  #devToggle{width:42px;height:42px;border-radius:12px;border:none;background:rgba(40,55,55,.5);color:#fff;font-size:21px;cursor:pointer;line-height:1;}
  #devNav{display:none;align-items:center;gap:6px;background:rgba(40,55,55,.82);border-radius:12px;padding:5px 8px;}
  #dev.on #devNav{display:flex;}
  #devNav button{width:38px;height:38px;border-radius:10px;border:none;background:#3a8d72;color:#fff;font-size:19px;cursor:pointer;}
  #devNav button:active{background:#2f7460;}
  #devLabel{color:#fff;font-size:17px;font-weight:700;min-width:104px;text-align:center;}
  #confetti{position:fixed;inset:0;z-index:62;pointer-events:none;}
  /* hint */
  #hint{display:none;}
  #hint.hide{opacity:0;}
  /* overlay popups — full-viewport dim (outside the scaled stage so it covers everything evenly) */
  #overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(20,30,30,.62);}
  .rdraw{width:460px;height:460px;margin:0 auto 20px;border-radius:34px;background:#fdf8ec;box-shadow:inset 0 0 0 4px rgba(0,0,0,.06),0 12px 28px rgba(0,0,0,.22);overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .rdraw.pop{animation:drawPop .62s cubic-bezier(.2,1.3,.4,1);}
  @keyframes drawPop{0%{transform:scale(.35);opacity:0;}60%{transform:scale(1.08);opacity:1;}100%{transform:scale(1);}}
  #bookBtn{position:fixed;right:9px;top:212px;z-index:56;width:56px;height:56px;border:none;border-radius:16px;background:#fffdf5;font-size:27px;box-shadow:0 8px 18px rgba(40,60,60,.25);cursor:pointer;}
  /* SKETCHBOOK gallery = a full pin-board page of memo papers */
  #gallery{position:fixed;inset:0;display:none;z-index:65;background:radial-gradient(120% 90% at 50% 12%,#eaf3ef 0%,#cfe0da 55%,#b9d2ca 100%);}
  #gallery.show{display:block;}
  #galHead{position:absolute;top:30px;left:0;width:100%;text-align:center;font-size:62px;font-weight:700;color:#5b7b86;z-index:2;}
  #ggrid{position:absolute;inset:120px 0 0 0;overflow-y:auto;display:grid;grid-template-columns:repeat(2,1fr);gap:46px 26px;padding:34px 34px 170px;align-content:start;}
  .gmemo{position:relative;display:flex;flex-direction:column;align-items:center;}
  .gpaper{position:relative;width:100%;aspect-ratio:3/4;border-radius:10px;background:#fbf4e2;box-shadow:0 12px 22px rgba(40,55,55,.28),inset 0 0 0 2px rgba(120,98,60,.12);transform:rotate(var(--rot,0deg));overflow:hidden;display:flex;align-items:center;justify-content:center;}
  body.paperui .gpaper{background:var(--ptex) center/cover;}
  .gpaper img{width:92%;height:92%;object-fit:contain;}
  .gmemo.empty .gpaper{box-shadow:0 10px 18px rgba(40,55,55,.22),inset 0 0 0 2px rgba(120,98,60,.12),inset 0 0 30px rgba(120,98,60,.12);}
  .gpin{position:absolute;top:-18px;left:50%;width:46px;height:46px;z-index:3;transform:translateX(-50%) rotate(var(--rot,0deg));filter:drop-shadow(0 5px 6px rgba(0,0,0,.32));pointer-events:none;}
  .gname{margin-top:10px;font-size:22px;font-weight:700;color:#6b5f4a;text-align:center;white-space:nowrap;}
  .gmemo.empty .gname{color:#9a8f7c;opacity:.75;}
  #galBack{position:fixed;left:22px;bottom:24px;z-index:66;width:84px;height:84px;border:none;border-radius:24px;background:#fffdf5;font-size:46px;font-weight:700;color:#7f9098;box-shadow:0 6px 14px rgba(40,60,60,.22);cursor:pointer;}
  #galBack.imgbtn{transform:scaleX(-1);}   /* reuse the NEXT arrow, flipped */
  .rdraw img{width:100%;height:100%;object-fit:contain;}
  #overlay.show{display:flex;}
  .panel{width:1040px;background:linear-gradient(180deg,#fffef9,#fff5e9);border-radius:56px;padding:70px 40px 58px;text-align:center;box-shadow:0 34px 90px rgba(0,0,0,.42);transform:scale(var(--s,1));transform-origin:center;}
  .panel.fail{background:linear-gradient(180deg,#fffaf6,#fcecdf);}
  .panel img.rate{width:540px;height:auto;margin:0 auto 4px;display:block;filter:drop-shadow(0 10px 16px rgba(0,0,0,.16));}
  .panel img.badge{width:280px;height:280px;object-fit:contain;margin:0 auto 8px;display:block;}
  .panel .praise{font-size:44px;font-weight:900;color:#2f9e7e;margin:10px 6px 6px;line-height:1.1;white-space:nowrap;}
  .panel.fail .praise{color:#e0883a;}
  .panel .score{font-size:32px;color:#8a9aa0;margin:0 0 20px;font-weight:800;letter-spacing:1px;}
  .rcompare{display:flex;justify-content:center;gap:26px;margin:14px 0 10px;}
  .rcompare figure{margin:0;}
  .rcompare img{width:262px;height:262px;object-fit:contain;border-radius:26px;background:#fbf6ec;box-shadow:inset 0 0 0 3px rgba(0,0,0,.07);display:block;}
  .rcompare img.diff{image-rendering:pixelated;background:#f1ebdf;}
  .rcompare figcaption{font-size:28px;font-weight:800;color:#7a8a90;margin-top:12px;letter-spacing:1px;}
  .rlegend{font-size:27px;font-weight:700;color:#8a9aa0;margin:2px 0 30px;}
  .rlegend i{display:inline-block;width:26px;height:26px;border-radius:7px;vertical-align:-3px;margin-right:9px;}
  .rlegend i.ok{background:#4ec678;} .rlegend i.bad{background:#eb5454;}
  #toast{position:fixed;left:50%;top:28%;transform:translate(-50%,-50%) scale(.6);opacity:0;z-index:63;pointer-events:none;}
  #toast.show{animation:toastPop 1.9s ease forwards;}
  #toast img{width:560px;height:auto;filter:drop-shadow(0 12px 20px rgba(0,0,0,.32));}
  @keyframes toastPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.45) rotate(-4deg);}12%{opacity:1;transform:translate(-50%,-50%) scale(1.12) rotate(2deg);}22%{transform:translate(-50%,-50%) scale(1) rotate(0);}80%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-62%) scale(.95);}}
  .btn{font-size:38px;font-weight:800;color:#fff;background:linear-gradient(180deg,#48c79f,#2f9e7e);border:none;border-radius:36px;padding:24px 40px;margin:8px;cursor:pointer;box-shadow:0 10px 0 #237a61,0 14px 24px rgba(0,0,0,.2);min-width:440px;}
  .btns{display:flex;flex-direction:column;align-items:center;gap:20px;margin-top:14px;}
  .btn.disabled{filter:grayscale(1) opacity(.5);pointer-events:none;}
  /* image buttons (generated paper-texture icons) */
  .imgbtn{background-color:transparent!important;background-image:none;background-size:contain!important;background-repeat:no-repeat!important;background-position:center!important;box-shadow:none!important;border:none!important;color:transparent!important;font-size:0!important;}
  /* result popup = a sketchbook page (content sits below the spiral) */
  .panel.sketch{width:880px;background:var(--skbg) center/100% 100% no-repeat;box-shadow:none;border-radius:0;padding:172px 110px 116px;}
  body.paperui #refBox .rinner{background:var(--ptex) center/cover!important;}
  body.paperui .btn{background:var(--ptex) center/cover!important;color:#4a3c28!important;text-shadow:0 1px 0 rgba(255,255,255,.6);box-shadow:0 9px 0 rgba(120,98,60,.5),0 13px 22px rgba(0,0,0,.22)!important;border:2px solid rgba(120,98,60,.28);}
  .btn:active{transform:translateY(6px);box-shadow:0 4px 0 #237a61;}
  .btn.alt{background:linear-gradient(180deg,#f0a64e,#e0822f);box-shadow:0 10px 0 #b5651f,0 14px 24px rgba(0,0,0,.2);}
  .btn.alt:active{box-shadow:0 4px 0 #b5651f;}
</style>
</head>
<body>
<div id="bgfill"></div>
<div id="stageWrap"><div id="stage">

  <div id="field">
    <img id="paper" alt="">
    <canvas id="play"></canvas>
    <img id="sprayCan" alt="">
  </div>
  <div id="bottom">

  <button id="doneBtn" title="submit">✓</button>
  <div id="hint"></div>
  <div id="rating"><img id="ratingImg" alt=""></div>
  <div id="toast"><img id="toastImg" alt=""></div>
</div>
<div id="msgToast"><img id="msgImg" alt=""></div>
<div id="stepRate"></div>
<div id="overlay"><div class="panel" id="popup"></div></div>
<button id="bookBtn" title="sketchbook">📒</button>
<div id="gallery"><div id="galHead">SKETCHBOOK</div><div id="ggrid"></div><button id="galBack">←</button></div>
<canvas id="dragLayer"></canvas>
<canvas id="confetti"></canvas>

<div id="refBox"><img id="refPin" alt=""><div class="rinner"><div class="rlab">GOAL</div><img id="refImg" alt=""></div></div>
</div>

const $ = s => document.querySelector(s);
const playCv = $('#play'); const W = STAGE.canvas.w, H = STAGE.canvas.h;
playCv.width = W; playCv.height = H;
const ctx = playCv.getContext('2d');
const assets = STAGE.assets || {};

// offscreen canvases
const mk=()=>{const c=document.createElement('canvas');c.width=W;c.height=H;return c;};
const targetCv=mk(),paintCv=mk(),maskCv=mk(),sweepCv=mk(),holeInkCv=mk(),sheetCv=mk(),dilatedCv=mk();
const targetCtx=targetCv.getContext('2d'),paintCtx=paintCv.getContext('2d'),maskCtx=maskCv.getContext('2d'),
      sweepCtx=sweepCv.getContext('2d'),holeInkCtx=holeInkCv.getContext('2d'),sheetCtx=sheetCv.getContext('2d'),dilatedCtx=dilatedCv.getContext('2d');

function loadImg(src){return new Promise(r=>{if(!src)return r(null);const i=new Image();i.onload=()=>r(i);i.onerror=()=>r(null);i.src=src;});}

// state
let targetImg=null, maskImgs=[];
let state='loading';            // loading|idle|placing|spraying|awaitPeel|peeling|judging
let active=null;                // current stencil
let tutorial=!!STAGE.tutorial;
const stencils=STAGE.stencils.map(s=>({...s,used:false}));
const order=stencils.slice().sort((a,b)=>a.seq-b.seq);   // progressive paint order: back -> front, one stencil per step
let stepIdx=0;
// carousel display order: paint order (easy) for stages 1-2, SHUFFLED from stage 3 so the player must work out the order
// HEALING: present stencils in correct paint order (back -> front). The "next" one is gently highlighted.
const displayOrder=stencils.slice();
const nextStencil=()=>stencils.filter(s=>!s.used).sort((a,b)=>a.seq-b.seq)[0]||null;
const SPRAY_R=Math.round(W*0.075);
const PAGE_R=Math.round(W*0.07);   // rounded-corner radius of the paper page -> painting/stencil corners never look square
const SHEET_COLOR='#2a2a30';   // matte black plastic stencil (matches the queue cards)
// ---- drag-to-place grid (Option A: position is part of the puzzle) ----
const GRID=20, CELL=W/GRID;            // fine grid the stencil snaps to
let dragging=null, dragTileCv=null, dragBox={w:0,h:0}, dragHome={x:0,y:0}, dragPos={x:0,y:0}, dragSnapped=false, dragOverField=false;
let placeOffset={x:0,y:0};             // placed offset from correct home (0,0 = correct)

// geometry for diagonal peel — origin corner + direction set when a corner is grabbed
let peelL=Math.hypot(W,H), peelSquare=[[0,0],[W,0],[W,H],[0,H]];   // peel geometry — set per placement to the stencil rect
const CORNERS=[[0,0],[W,0],[W,H],[0,H]];
let ox=0,oy=0,dX=W/peelL,dY=H/peelL;    // peel origin corner + unit direction toward opposite
let peel=0;                     // 0..1 peel progress
let sprayT=0;                   // 0..1 spray animation progress
let nozzle={x:0,y:0,show:false};
let sprayBox={x0:0,y0:0,x1:W,y1:H}, sprayRows=10;  // spray sweep region (around holes)

// ---------- audio ----------
const A={};
function initAudio(){ for(const k of ['spray','chak','peel','win','fail']){ if(assets[k]){A[k]=new Audio(assets[k]);A[k].preload='auto';} } if(A.spray)A.spray.loop=true; if(A.peel)A.peel.loop=true; }
// mobile browsers block audio until a user gesture — unlock all clips on the first touch
let audioUnlocked=false;
// prime ONLY a short one-shot (NOT the looping spray/peel — priming those leaked spray sound during drag)
function unlockAudio(){ if(audioUnlocked)return; audioUnlocked=true; const a=A.chak||A.win||A.fail; if(!a)return; try{ a.muted=true; const pr=a.play(); const done=()=>{ a.pause(); a.currentTime=0; a.muted=false; }; if(pr&&pr.then)pr.then(done).catch(()=>{a.muted=false;}); else done(); }catch(e){} }
window.addEventListener('pointerdown',unlockAudio,true);
function loopOn(a,vol){ if(a){try{a.volume=vol;a.currentTime=0;a.play().catch(()=>{});}catch(e){}} }
function loopOff(a){ if(a){try{a.pause();}catch(e){}} }
function sfx(k){ if(A[k]){try{A[k].currentTime=0;A[k].play().catch(()=>{});}catch(e){}} }

// ---------- init ----------
(async function init(){
  if(assets.bg) $('#bgfill').style.backgroundImage=`url(${assets.bg})`;

  const comp=new Int32Array(S*S).fill(-1); let nc=0; const area=[],okc=[]; const stk=[];
  for(let s=0;s<S*S;s++){ if(comp[s]!==-1||tl[s]<0)continue; const id=nc++; area[id]=0;okc[id]=0; comp[s]=id; stk.push(s);
    while(stk.length){ const i=stk.pop(); area[id]++; const x=i%S,y=(i/S)|0, sx=x+dtx, sy=y+dty;
      if(sx>=0&&sy>=0&&sx<S&&sy<S && plab[sy*S+sx]===tl[i]) okc[id]++;
      if(x>0&&comp[i-1]===-1&&tl[i-1]===tl[i]){comp[i-1]=id;stk.push(i-1);}
      if(x<S-1&&comp[i+1]===-1&&tl[i+1]===tl[i]){comp[i+1]=id;stk.push(i+1);}
      if(y>0&&comp[i-S]===-1&&tl[i-S]===tl[i]){comp[i-S]=id;stk.push(i-S);}
      if(y<S-1&&comp[i+S]===-1&&tl[i+S]===tl[i]){comp[i+S]=id;stk.push(i+S);} } }
  // only SUBSTANTIAL regions count -> tiny edge mismatches don't false-fail a correct play,
  // but a large buried/mis-ordered region (wrong order) still tanks compMin.
  let compMin=1; for(let id=0;id<nc;id++){ if(area[id]<220)continue; const r=okc[id]/area[id]; if(r<compMin)compMin=r; }
  const win = overall>=0.8 && (DIFF!=='hard' || compMin>=0.42);   // hard: no large region may be buried
  // diff view: green where the painted picture matches the target, red where it's wrong (aligned)
  const diffCv=document.createElement('canvas'); diffCv.width=S; diffCv.height=S; const dcx=diffCv.getContext('2d'); const idata=dcx.createImageData(S,S);
  for(let y=0;y<S;y++)for(let x=0;x<S;x++){ const i=y*S+x, o=i*4; if(tl[i]<0){ idata.data[o+3]=0; continue; } const sx=x+dtx,sy=y+dty; const m=(sx>=0&&sy>=0&&sx<S&&sy<S&&plab[sy*S+sx]===tl[i]); idata.data[o]=m?78:235; idata.data[o+1]=m?198:84; idata.data[o+2]=m?120:84; idata.data[o+3]=255; }
  dcx.putImageData(idata,0,0); lastDiffURL=diffCv.toDataURL();
  setTimeout(()=> showResult(overall, win), 500);
}
let lastDiffURL='';
function mkS(S,src){const c=document.createElement('canvas');c.width=S;c.height=S;const x=c.getContext('2d');x.drawImage(src,0,0,S,S);return x;}
// >=80% = success. 100% -> NEXT only; 80-99% -> NEXT + RETRY; <80% -> RETRY only.
const WIN_LINES=['Cleared in one go!','Brilliant sense!','Masterful!','Flawless work!','You nailed it!','So satisfying!','Picture perfect!','A real artist!'];
const FAIL_LINES=['So close!','Almost had it!','Nearly there!','Don’t give up!','One more try!','Tantalizingly close!'];
const GOOD_LINES=['Nicely done!','Good thinking!','Well played!','Solid work!','Got it!'];
function pick(a){ return a[Math.floor(rand()*a.length)]; }
let rseed=1; function rand(){ rseed=(rseed*1103515245+12345)&0x7fffffff; return rseed/0x7fffffff; }   // (seed varied below)
// avg = average per-part score (0..100). >=100 perfect (NEXT). 80-99 pass (NEXT+RETRY). <80 fail (RETRY).
// HEALING result: the finished picture comes to life, saved into the sketchbook. No score / no fail.
function saveToGallery(pic){ try{ const g=JSON.parse(localStorage.getItem('ss_gallery')||'{}'); g[STAGE.id||1]={pic,name:STAGE.name||''}; localStorage.setItem('ss_gallery',JSON.stringify(g)); }catch(e){} }
function galleryCount(){ try{ return Object.keys(JSON.parse(localStorage.getItem('ss_gallery')||'{}')).length; }catch(e){ return 0; } }
// temporary picture names per stage (stages aren't defined yet) — stage 1 is the real one
const GALLERY_NAMES=['Lighthouse','Fox','Whale','Owl','Cabin','Balloon','Sailboat','Cat','Pine','Lantern','Deer','Bear'];
function openGallery(){ let g={}; try{g=JSON.parse(localStorage.getItem('ss_gallery')||'{}');}catch(e){}
  const grid=$('#ggrid'); grid.innerHTML='';
  GALLERY_NAMES.forEach((name,i)=>{ const sid=i+1, got=g[sid];
    const memo=document.createElement('div'); memo.className='gmemo'+(got?'':' empty');
    const rot=((i*47)%9-4)*0.6; memo.style.setProperty('--rot',rot+'deg');   // gentle varied tilt
    const pin = assets.pin?`<img class="gpin" src="${assets.pin}">`:'';
    memo.innerHTML = `${pin}<div class="gpaper">${got?`<img src="${got.pic}">`:''}</div><div class="gname">${name}</div>`;
    grid.appendChild(memo);
  });
  $('#gallery').classList.add('show'); }
function showResult(acc){
  state='judging';
  acc = (typeof acc==='number') ? acc : 100;
  const p=$('#popup');
  const comp=cloneCv(paintCv); if(linesCv) comp.getContext('2d').drawImage(linesCv,0,0);   // finished picture with clean divider/border lines
  const pic=comp.toDataURL();
  const cleared = acc>=80;                                  // only ≥80% pictures are collected into the sketchbook
  if(cleared) saveToGallery(pic);
  const hasGallery = galleryCount()>0;
  const praise = acc>=95?'Beautiful work!' : acc>=85?'Lovely colouring!' : acc>=80?'Nicely done!' : 'Almost there!';
  const draw=`<div class="rdraw pop"><img src="${pic}"></div>`;
  // buttons by accuracy: ≥80 -> NEXT ; <100 -> RETRY ; SKETCHBOOK always (disabled/grey when nothing collected yet)
  let btns='';
  if(cleared) btns += `<button class="btn" id="nx">NEXT</button>`;
  if(acc<100)  btns += `<button class="btn alt" id="rt">RETRY</button>`;
  btns += `<button class="btn book${hasGallery?'':' disabled'}" id="gal">SKETCHBOOK</button>`;
  sfx(cleared?'win':'fail'); if(navigator.vibrate)navigator.vibrate([20,40,20,40,40]); p.className='panel'+(assets.sketchPopup?' sketch':''); launchConfetti(acc>=85);
  p.innerHTML=`${draw}<div class="praise">${praise}</div><p class="score">ACCURACY ${acc}%</p><div class="btns">${btns}</div>`;
  $('#overlay').classList.add('show');
  const nx=$('#nx'); if(nx) nx.onclick=()=>{ if(STAGE.next)location.href=STAGE.next; else location.reload(); };
  const rt=$('#rt'); if(rt) rt.onclick=()=>location.reload();                       // retry the same stage
  const gal=$('#gal'); if(gal && hasGallery) gal.onclick=openGallery;               // disabled when empty -> no handler
}

// ---------- reference hold-to-zoom ----------
function setupRefZoom(){ const box=$('#refBox'); if(!box)return;
  const on=e=>{e.preventDefault();e.stopPropagation();box.classList.add('zoom');};
  const off=()=>box.classList.remove('zoom');
  box.addEventListener('pointerdown',on); window.addEventListener('pointerup',off); box.addEventListener('pointercancel',off); box.addEventListener('pointerleave',off);
}
function setHint(t){ const h=$('#hint'); if(!t){h.classList.add('hide');return;} h.textContent=t; h.classList.remove('hide'); }

// ---------- QA hooks (harmless in normal play) ----------
window.__qa={ state:()=>state,
  colors:()=>STAGE_COLORS.slice(),
  pick:(c)=>{ const i=STAGE_COLORS.indexOf(c); if(i>=0)selectCan(i); else selColor=c; },
  brush:(r)=>{ brushRadius=r; const sl=$('#wslider'); if(sl)sl.value=r; updateWcirc(); return brushRadius; },
  entryDone:()=>state!=='entry'&&state!=='loading',
  sprayAt:(x,y)=>{ if(!selColor){ selColor=STAGE_COLORS[0]; buildBottom(); } fillSpray(x,y); },   // finger-spray one dab (exercises the paint path)
  // PERFECT colouring of the CURRENT step: copy target into sweep, clipped to the current region's hole
  autoFill:()=>{ const t=document.createElement('canvas');t.width=W;t.height=H;const g=t.getContext('2d'); g.drawImage(targetCv,0,0); g.globalCompositeOperation='destination-in'; g.drawImage(maskCv,0,0); sweepCtx.drawImage(t,0,0); ensureDraw(); return true; },
  steps:()=>order.length, step:()=>stepIdx,
  fillColor:(hex)=>{ const t=document.createElement('canvas');t.width=W;t.height=H;const g=t.getContext('2d'); g.fillStyle=hex; g.fillRect(0,0,W,H); g.globalCompositeOperation='destination-in'; g.drawImage(maskCv,0,0); sweepCtx.drawImage(t,0,0); ensureDraw(); return true; },   // fill current region with a (possibly WRONG) colour
  next:()=>advance(), complete:()=>advance(),
  pix:(x,y)=>{ const d=paintCtx.getImageData(x|0,y|0,1,1).data; return [d[0],d[1],d[2],d[3]]; },
  result:()=>{ const ov=$('#overlay'); if(!ov||!ov.classList.contains('show'))return null; const p=$('#popup'),sc=p.querySelector('.score'); return sc?sc.textContent:''; } };
// ---------- developer mode: top-left toggle + jump between stages ----------
(function(){ const TOTAL=30, id=(typeof STAGE!=='undefined'&&STAGE.id)||1, dev=$('#dev');
  if(localStorage.getItem('ss_dev')==='1') dev.classList.add('on');
  $('#devLabel').textContent='STAGE '+id+' / '+TOTAL;
  $('#devToggle').onclick=()=>{ const now=!dev.classList.contains('on'); dev.classList.toggle('on',now); localStorage.setItem('ss_dev',now?'1':'0'); };
  const go=n=>{ n=Math.max(1,Math.min(TOTAL,n)); if(n===id)return; location.href=(n<=1?'index.html':'stage'+n+'.html'); };
  $('#devPrev').onclick=()=>go(id-1); $('#devNext').onclick=()=>go(id+1);
})();
</script>
