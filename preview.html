<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Stencil Spray</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;touch-action:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:#cfe3dd;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  #bgfill{position:fixed;inset:0;z-index:0;background:radial-gradient(120% 90% at 50% 18%,#eaf3ef 0%,#cfe0da 55%,#b9d2ca 100%);background-size:cover;background-position:center;}
  #stageWrap{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;}
  #stage{position:relative;width:1080px;height:1920px;flex:none;transform-origin:center center;}
  /* top bar */
  #topbar{position:absolute;top:54px;left:0;width:100%;height:110px;display:flex;align-items:center;justify-content:center;z-index:25;}
  #prog{box-sizing:border-box;position:relative;width:660px;height:74px;background:#fbf3e1;border:7px solid #aedfca;border-radius:40px;box-shadow:0 6px 10px rgba(60,80,80,.2),inset 0 3px 5px rgba(120,100,70,.08);}
  #progClip{position:absolute;top:4px;left:4px;height:calc(100% - 8px);width:0;overflow:hidden;border-radius:30px;transition:width .4s cubic-bezier(.2,.85,.25,1);}
  #progFill{height:100%;width:638px;border-radius:30px;background:linear-gradient(180deg,#aef0d0 0%,#63cd9f 55%,#56c294 100%);box-shadow:inset 0 2px 2px rgba(255,255,255,.55),inset 0 -2px 3px rgba(0,0,0,.06);}
  /* per-placement rating image popup */
  #rating{position:absolute;left:50%;top:540px;transform:translate(-50%,-50%) scale(.5);opacity:0;z-index:42;pointer-events:none;}
  #rating.show{animation:ratePop .9s ease forwards;}
  #rating img{width:460px;height:auto;filter:drop-shadow(0 10px 16px rgba(0,0,0,.28));}
  @keyframes ratePop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4);}18%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}30%{transform:translate(-50%,-50%) scale(1);}75%{opacity:1;transform:translate(-50%,-58%) scale(1);}100%{opacity:0;transform:translate(-50%,-72%) scale(.95);}}
  /* play field */
  #field{position:absolute;top:168px;left:50%;transform:translateX(-50%);width:1000px;height:1000px;border-radius:40px;
    background:transparent;filter:drop-shadow(0 18px 38px rgba(60,80,80,.26));overflow:hidden;}
  #paper{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  /* play area inset within the sketchbook page (below the spiral binding) so the stencil never exceeds the book */
  #play{position:absolute;top:12%;left:9%;width:82%;height:82%;}
  #sprayCan{position:absolute;width:172px;height:172px;object-fit:contain;pointer-events:none;display:none;
    transform:translate(-18%,-74%);z-index:7;filter:drop-shadow(0 8px 10px rgba(0,0,0,.32));}
  /* pinned reference note (top-right of field) */
  #refBox{position:fixed;top:60px;right:9px;width:104px;height:109px;border-radius:12px;background:#fffdf5;z-index:55;
    box-shadow:0 10px 22px rgba(40,60,60,.22),inset 0 0 0 2px rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center;
    overflow:visible;cursor:zoom-in;transform:rotate(3deg);transform-origin:top right;
    transition:transform .2s cubic-bezier(.2,.85,.25,1),box-shadow .2s;}
  #refBox .rinner{position:absolute;inset:0;border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#fffdf5;}
  #refBox img#refImg{width:84%;height:84%;object-fit:contain;margin-top:10px;}
  #refBox .rlab{position:absolute;top:5px;left:0;width:100%;text-align:center;font-size:13px;font-weight:800;color:#7f9098;z-index:2;}
  #refPin{position:absolute;top:-27px;left:50%;transform:translateX(-50%);width:60px;height:60px;z-index:3;filter:drop-shadow(0 6px 7px rgba(0,0,0,.28));pointer-events:none;}
  #refBox.zoom{transform:rotate(0deg) scale(3.2);box-shadow:0 26px 60px rgba(0,0,0,.4);cursor:zoom-out;}
  /* bottom panel: stencil queue only (no palette — color is automatic) */
  #bottom{position:absolute;top:1240px;left:0;width:100%;height:680px;z-index:5;}
  #queueLabel{position:absolute;top:6px;left:0;width:100%;text-align:center;font-size:30px;font-weight:800;color:#5b7b86;opacity:.92;}
  /* stencil TRAY: every remaining stencil laid out; tap one to auto-place it */
  #queue{position:absolute;top:70px;left:0;width:100%;height:600px;display:flex;flex-wrap:wrap;align-items:center;align-content:center;justify-content:center;gap:24px;padding:0 28px;box-sizing:border-box;}
  .ttile{position:relative;width:246px;height:234px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s ease;-webkit-tap-highlight-color:transparent;}
  .ttile:active{transform:scale(.94);}
  .ttile img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 12px 18px rgba(40,60,60,.34));pointer-events:none;}
  .ttile::after{content:'';position:absolute;inset:8px;border-radius:24px;background:#ea4d42;opacity:0;pointer-events:none;}   /* red "wrong" wash */
  .ttile.reject{z-index:30;animation:tileReject .72s cubic-bezier(.3,.7,.3,1);}
  .ttile.reject::after{animation:redFlash .72s ease;}
  @keyframes tileReject{0%{transform:translateY(0) scale(1);}28%{transform:translateY(-56px) scale(1.05) rotate(-1.5deg);}60%{transform:translateY(-56px) scale(1.05) rotate(1.5deg);}100%{transform:translateY(0) scale(1);}}   /* rise -> hold -> fall */
  @keyframes redFlash{0%,28%{opacity:0;}45%{opacity:.74;}74%{opacity:.74;}100%{opacity:0;}}
  #msgToast{position:fixed;left:50%;top:57%;transform:translate(-50%,-50%) scale(.8);z-index:64;pointer-events:none;opacity:0;}
  #msgToast img{width:440px;height:auto;filter:drop-shadow(0 12px 22px rgba(0,0,0,.26));}
  #msgToast.show{animation:msgPop 1.4s ease forwards;}
  @keyframes msgPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.8);}12%{opacity:1;transform:translate(-50%,-58%) scale(1.06);}22%{transform:translate(-50%,-60%) scale(1);}78%{opacity:1;transform:translate(-50%,-62%) scale(1);}100%{opacity:0;transform:translate(-50%,-70%) scale(.95);}}
  .stars{display:flex;justify-content:center;gap:16px;margin:4px 0 16px;}
  .stars img{width:100px;height:100px;}
  .stars img.off{filter:grayscale(1) brightness(1.3) opacity(.42);}
  #dragLayer{position:fixed;inset:0;z-index:58;pointer-events:none;}
  #dev{position:fixed;left:10px;top:10px;z-index:70;display:flex;align-items:center;gap:8px;font-family:system-ui,sans-serif;}
  #devToggle{width:42px;height:42px;border-radius:12px;border:none;background:rgba(40,55,55,.5);color:#fff;font-size:21px;cursor:pointer;line-height:1;}
  #devNav{display:none;align-items:center;gap:6px;background:rgba(40,55,55,.82);border-radius:12px;padding:5px 8px;}
  #dev.on #devNav{display:flex;}
  #devNav button{width:38px;height:38px;border-radius:10px;border:none;background:#3a8d72;color:#fff;font-size:19px;cursor:pointer;}
  #devNav button:active{background:#2f7460;}
  #devLabel{color:#fff;font-size:17px;font-weight:700;min-width:104px;text-align:center;}
  #confetti{position:fixed;inset:0;z-index:62;pointer-events:none;}
  /* hint */
  #hint{display:none;}
  #hint.hide{opacity:0;}
  /* overlay popups — full-viewport dim (outside the scaled stage so it covers everything evenly) */
  #overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(20,30,30,.62);}
  .rdraw{width:460px;height:460px;margin:0 auto 20px;border-radius:34px;background:#fdf8ec;box-shadow:inset 0 0 0 4px rgba(0,0,0,.06),0 12px 28px rgba(0,0,0,.22);overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .rdraw img{width:100%;height:100%;object-fit:contain;}
  #overlay.show{display:flex;}
  .panel{width:1040px;background:linear-gradient(180deg,#fffef9,#fff5e9);border-radius:56px;padding:70px 40px 58px;text-align:center;box-shadow:0 34px 90px rgba(0,0,0,.42);transform:scale(var(--s,1));transform-origin:center;}
  .panel.fail{background:linear-gradient(180deg,#fffaf6,#fcecdf);}
  .panel img.rate{width:540px;height:auto;margin:0 auto 4px;display:block;filter:drop-shadow(0 10px 16px rgba(0,0,0,.16));}
  .panel img.badge{width:280px;height:280px;object-fit:contain;margin:0 auto 8px;display:block;}
  .panel .praise{font-size:44px;font-weight:900;color:#2f9e7e;margin:10px 6px 6px;line-height:1.1;white-space:nowrap;}
  .panel.fail .praise{color:#e0883a;}
  .panel .score{font-size:32px;color:#8a9aa0;margin:0 0 20px;font-weight:800;letter-spacing:1px;}
  .rcompare{display:flex;justify-content:center;gap:26px;margin:14px 0 10px;}
  .rcompare figure{margin:0;}
  .rcompare img{width:262px;height:262px;object-fit:contain;border-radius:26px;background:#fbf6ec;box-shadow:inset 0 0 0 3px rgba(0,0,0,.07);display:block;}
  .rcompare img.diff{image-rendering:pixelated;background:#f1ebdf;}
  .rcompare figcaption{font-size:28px;font-weight:800;color:#7a8a90;margin-top:12px;letter-spacing:1px;}
  .rlegend{font-size:27px;font-weight:700;color:#8a9aa0;margin:2px 0 30px;}
  .rlegend i{display:inline-block;width:26px;height:26px;border-radius:7px;vertical-align:-3px;margin-right:9px;}
  .rlegend i.ok{background:#4ec678;} .rlegend i.bad{background:#eb5454;}
  #toast{position:fixed;left:50%;top:28%;transform:translate(-50%,-50%) scale(.6);opacity:0;z-index:63;pointer-events:none;}
  #toast.show{animation:toastPop 1.9s ease forwards;}
  #toast img{width:560px;height:auto;filter:drop-shadow(0 12px 20px rgba(0,0,0,.32));}
  @keyframes toastPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.45) rotate(-4deg);}12%{opacity:1;transform:translate(-50%,-50%) scale(1.12) rotate(2deg);}22%{transform:translate(-50%,-50%) scale(1) rotate(0);}80%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-62%) scale(.95);}}
  .btn{font-size:38px;font-weight:800;color:#fff;background:linear-gradient(180deg,#48c79f,#2f9e7e);border:none;border-radius:36px;padding:26px 60px;margin:8px;cursor:pointer;box-shadow:0 10px 0 #237a61,0 14px 24px rgba(0,0,0,.2);}
  .btn:active{transform:translateY(6px);box-shadow:0 4px 0 #237a61;}
  .btn.alt{background:linear-gradient(180deg,#f0a64e,#e0822f);box-shadow:0 10px 0 #b5651f,0 14px 24px rgba(0,0,0,.2);}
  .btn.alt:active{box-shadow:0 4px 0 #b5651f;}
</style>
</head>
<body>
<div id="bgfill"></div>
<div id="stageWrap"><div id="stage">
  <div id="topbar"><div id="prog"><div id="progClip"><div id="progFill"></div></div></div></div>

    <img id="paper" alt="">
    <canvas id="play"></canvas>
    <img id="sprayCan" alt="">

  <div id="bottom">

    <div id="queue"></div>
  </div>
  <div id="hint"></div>
  <div id="rating"><img id="ratingImg" alt=""></div>
  <div id="toast"><img id="toastImg" alt=""></div>
</div>
<div id="msgToast"><img id="msgImg" alt=""></div>
<div id="overlay"><div class="panel" id="popup"></div></div>
<canvas id="dragLayer"></canvas>
<canvas id="confetti"></canvas>
<div id="dev"><button id="devToggle" title="dev mode">⚙</button><div id="devNav"><button id="devPrev">◀</button><span id="devLabel"></span><button id="devNext">▶</button></div></div>
<div id="refBox"><img id="refPin" alt=""><div class="rinner"><div class="rlab">GOAL</div><img id="refImg" alt=""></div></div>
</div>

function computeTiles(){

  buildHoleInk();                          // make sure the solid ink is ready, then commit (no rating popup mid-action)
  commitActive(false);
  sweepCtx.clearRect(0,0,W,H); sheetCtx.clearRect(0,0,W,H); holeInkCtx.clearRect(0,0,W,H); peel=0;
}
// ---------- end-of-stage scoring review: fade out -> target -> re-reveal parts in order + pencil scores ----------
function cloneCv(cv){ const c=document.createElement('canvas'); c.width=cv.width; c.height=cv.height; c.getContext('2d').drawImage(cv,0,0); return c; }
function bboxCenter(cv){ const w=cv.width,h=cv.height,d=cv.getContext('2d').getImageData(0,0,w,h).data; let mnx=w,mny=h,mxx=0,mxy=0,any=false; for(let y=0;y<h;y++){const r=y*w;for(let x=0;x<w;x++){ if(d[(r+x)*4+3]>40){any=true;if(x<mnx)mnx=x;if(x>mxx)mxx=x;if(y<mny)mny=y;if(y>mxy)mxy=y;} }} return any?{x:(mnx+mxx)/2,y:(mny+mxy)/2}:{x:W/2,y:H/2}; }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
function anim(dur,fn){ return new Promise(res=>{ const t0=performance.now(); (function st(){ const k=Math.min(1,(performance.now()-t0)/dur); fn(k); if(k<1)requestAnimationFrame(st); else res(); })(); }); }
function posScore(deltaCells){ return Math.round(Math.max(0,Math.min(100, 100 - Math.max(0,deltaCells-0.5)*16))); }
function scoreColor(s){ return s>=90?'#2f9e7e':(s>=70?'#c79a30':'#d8593f'); }
// brief 'COMPLETE!' beat on the finished drawing, then the dim result layer with one accuracy %
async function runReview(){
  $('#sprayCan').style.display='none'; const rt=$('#rating'); if(rt)rt.classList.remove('show');
  sfx('chak'); if(navigator.vibrate)navigator.vibrate([10,40,10,40,30]);
  await anim(820, t=>{
    ctx.clearRect(0,0,W,H);
    const s=1+0.05*Math.sin(Math.min(1,t/0.5)*Math.PI);   // satisfying pop
    ctx.save(); ctx.translate(W/2,H/2); ctx.scale(s,s); ctx.drawImage(paintCv,-W/2,-H/2); ctx.restore();
    const gr=ctx.createRadialGradient(W/2,H/2,W*0.08,W/2,H/2,W*(0.25+0.7*t));
    gr.addColorStop(0,'rgba(255,255,255,0)'); gr.addColorStop(0.82,`rgba(255,250,205,${0.4*(1-t)})`); gr.addColorStop(1,'rgba(255,250,205,0)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
  });
  await wait(120);
  showResult();
}
// accuracy = how close the final drawing is to the target. tap-placed -> auto-aligned; identical drawing -> 100%.
function computeAccuracy(){
  const S=140, tcx=mkS(S,targetCv), pcx=mkS(S,paintCv);
  const td=tcx.getImageData(0,0,S,S).data, pd=pcx.getImageData(0,0,S,S).data;
  const pal=STAGE.palette.map(h=>{h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];});
  const near=(d,i)=>{ if(d[i+3]<80)return -1; let bi=0,bd=1e9; for(let k=0;k<pal.length;k++){const dd=(d[i]-pal[k][0])**2+(d[i+1]-pal[k][1])**2+(d[i+2]-pal[k][2])**2; if(dd<bd){bd=dd;bi=k;}} return bi; };
  // per-REGION average: every visible target region must be reproduced (a region buried by a wrong order shows the
  // wrong colour -> its match ~0 -> drags the average down, so wrong order != 100%). TRANSLATION-INVARIANT: align by
  // content bbox so dragging the whole picture shifted is fine (only relative position + order matter).
  const tl=new Int16Array(S*S), pl=new Int16Array(S*S);
  for(let p=0;p<S*S;p++){ tl[p]=near(td,p*4); pl[p]=near(pd,p*4); }
  const bb=lab=>{ let mnx=S,mny=S,mxx=-1,mxy=-1; for(let y=0;y<S;y++)for(let x=0;x<S;x++){ if(lab[y*S+x]>=0){ if(x<mnx)mnx=x;if(x>mxx)mxx=x;if(y<mny)mny=y;if(y>mxy)mxy=y; } } return {mnx,mny,empty:mxx<0}; };
  const tb=bb(tl), pb=bb(pl); if(pb.empty)return 0;
  const dtx=pb.mnx-tb.mnx, dty=pb.mny-tb.mny;
  const comp=new Int32Array(S*S).fill(-1); let nc=0; const stk=[];
  for(let s=0;s<S*S;s++){ if(comp[s]!==-1||tl[s]<0)continue; const id=nc++; comp[s]=id; stk.push(s);
    while(stk.length){ const i=stk.pop(); const x=i%S,y=(i/S)|0;
      if(x>0&&comp[i-1]===-1&&tl[i-1]===tl[i]){comp[i-1]=id;stk.push(i-1);}
      if(x<S-1&&comp[i+1]===-1&&tl[i+1]===tl[i]){comp[i+1]=id;stk.push(i+1);}
      if(y>0&&comp[i-S]===-1&&tl[i-S]===tl[i]){comp[i-S]=id;stk.push(i-S);}
      if(y<S-1&&comp[i+S]===-1&&tl[i+S]===tl[i]){comp[i+S]=id;stk.push(i+S);} } }
  // match only INTERIOR pixels of each region (skip 1px boundary = edge-AA noise) -> a correct play reads ~100,
  // a buried region's interior shows the wrong colour -> ~0
  const iarea=new Float64Array(nc), iok=new Float64Array(nc);
  for(let y=1;y<S-1;y++)for(let x=1;x<S-1;x++){ const i=y*S+x, id=comp[i]; if(id<0)continue;
    if(tl[i]===tl[i-1]&&tl[i]===tl[i+1]&&tl[i]===tl[i-S]&&tl[i]===tl[i+S]){ iarea[id]++; const sx=x+dtx,sy=y+dty; if(sx>=0&&sy>=0&&sx<S&&sy<S&&pl[sy*S+sx]===tl[i])iok[id]++; } }
  const minA=Math.round(S*S*0.003); let sum=0,cnt=0;
  for(let id=0;id<nc;id++){ if(iarea[id]<minA)continue; sum+=iok[id]/iarea[id]; cnt++; }
  const avg = cnt? sum/cnt : 0;
  const colorFrac = Math.min(1, avg/0.985);   // colour + ORDER correctness (translation-invariant)
  // POSITION correctness: every placed stencil should share the same offset as the rest (pictureOrigin).
  // Relative misalignment (pieces not fitting -> gaps) is penalised; a uniformly-shifted picture still scores full.
  let posSum=0,posN=0;
  if(pictureOrigin){ for(const s of stencils){ if(!s.used||!s.placedOffset)continue;
    const e=Math.hypot(s.placedOffset.x-pictureOrigin.x, s.placedOffset.y-pictureOrigin.y)/CELL;   // cells off the consensus
    posSum+=Math.max(0, 1 - e*0.42); posN++; } }
  const posFrac = posN? posSum/posN : 1;
  return Math.max(0, Math.min(100, Math.round(colorFrac*posFrac*100)));
}

// ---------- helpers ----------
function hexA(hex,a){const h=hex.replace('#','');return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}
const proj=p=>(p[0]-ox)*dX+(p[1]-oy)*dY;     // signed distance from peel-origin corner along d
function clipHalf(poly,c,keepGE){ const out=[],n=poly.length; const ins=p=>keepGE?(proj(p)>=c):(proj(p)<=c);
  for(let i=0;i<n;i++){const a=poly[i],b=poly[(i+1)%n],ia=ins(a),ib=ins(b); if(ia)out.push(a);
    if(ia!==ib){const da=proj(a)-c,db=proj(b)-c,t=da/(da-db); out.push([a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t]);}} return out; }
function pathPoly(c,poly){ if(!poly.length)return; c.beginPath();c.moveTo(poly[0][0],poly[0][1]); for(let i=1;i<poly.length;i++)c.lineTo(poly[i][0],poly[i][1]); c.closePath(); }

// ---------- render ----------
let rafOn=false;
function ensureDraw(){ if(!rafOn){ rafOn=true; requestAnimationFrame(render); } }   // wake the canvas only when something changed
function render(now){
  if(state==='spraying') stepSpray(now||performance.now());
  ctx.clearRect(0,0,W,H);
  ctx.save(); roundRect(ctx,0,0,W,H,PAGE_R); ctx.clip();   // round the page corners -> no square edges on the paper
  // committed paint (no center ghost — reference is the pinned note only)
  ctx.drawImage(paintCv,0,0);

  if(state==='dragging'){
    // the current painting (paintCv, already drawn above) shows through the semi-transparent sheet — no target overlay
    ctx.strokeStyle='rgba(70,95,95,0.11)'; ctx.lineWidth=1;
    for(let i=1;i<GRID;i++){ const p=i*CELL; ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,H);ctx.stroke(); ctx.beginPath();ctx.moveTo(0,p);ctx.lineTo(W,p);ctx.stroke(); }
  } else if(state==='spraying'){
    // through holes show paint/ghost below; sheet covers rest; sweep ink accumulates on top
    ctx.drawImage(sheetCv,0,0);
    ctx.drawImage(sweepCv,0,0);
  } else if(state==='peeling'){
    // clean result underneath (revealed where the messy sheet has peeled away)
    ctx.drawImage(holeInkCv,0,0);
    const f=peel*peelL;
    const remain=clipHalf(peelSquare,f,true);             // sheet still down (proj>=f)
    if(remain.length){ ctx.save(); pathPoly(ctx,remain); ctx.clip(); ctx.drawImage(sheetCv,0,0); ctx.restore(); }
    const shp=clipHalf(clipHalf(peelSquare,f,true),f+34,false); // shadow cast by lifted paper
    if(shp.length){ ctx.save(); pathPoly(ctx,shp); ctx.clip();
      const sg=ctx.createLinearGradient(ox+dX*f,oy+dY*f,ox+dX*(f+34),oy+dY*(f+34)); sg.addColorStop(0,'rgba(0,0,0,.22)'); sg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=sg; ctx.fillRect(0,0,W,H); ctx.restore(); }
    drawCurl(f);                                            // rolled-up band at the peel front
  }
  ctx.restore();   // end page-corner clip
  // spray nozzle cursor
  const can=$('#sprayCan');
  if(nozzle.show){ const cw=playCv.clientWidth, ch=playCv.clientHeight;
    can.style.display='block';
    can.style.left=(playCv.offsetLeft+nozzle.x/W*cw)+'px'; can.style.top=(playCv.offsetTop+nozzle.y/H*ch)+'px';
  } else can.style.display='none';
  if(state==='spraying'||state==='peeling') requestAnimationFrame(render); else rafOn=false;   // idle/dragging: no continuous redraw
}
function drawCurl(f){
  const cw=Math.min(f, 70);            // curl band width (grows then caps)
  if(cw<2) return;
  const band=clipHalf(clipHalf(peelSquare,f,false),f-cw,true);
  if(!band.length) return;
  const ax=ox+dX*(f-cw), ay=oy+dY*(f-cw), bx=ox+dX*f, by=oy+dY*f;
  ctx.save(); pathPoly(ctx,band); ctx.clip();
  // MATTE black-plastic cylinder shading (soft, no bright specular)
  const g=ctx.createLinearGradient(ax,ay,bx,by);
  g.addColorStop(0,'#3a3a40');     // far edge (underside)
  g.addColorStop(0.46,'#4c4c54');  // soft matte crest
  g.addColorStop(0.7,'#2c2c31');
  g.addColorStop(1,'rgba(10,10,12,.6)'); // base shadow
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // ink the rolled plastic carried as overspray
  ctx.globalAlpha=0.22; ctx.drawImage(sweepCv,-dX*f*0.05,-dY*f*0.05); ctx.globalAlpha=1;
  ctx.restore();
  // faint soft crest line (matte — not a bright highlight)
  const px=-dY, py=dX;
  ctx.strokeStyle='rgba(210,210,214,.22)'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(ax-px*peelL,ay-py*peelL); ctx.lineTo(ax+px*peelL,ay+py*peelL); ctx.stroke();
}
function drawCornerFolds(now){
  const bob=4+2.5*Math.sin(now/380);
  for(const [cx,cy] of CORNERS){
    const sx=cx===0?1:-1, sy=cy===0?1:-1, s=68+bob;
    // shadow cast under the lifted corner
    ctx.save(); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+sx*s,cy); ctx.lineTo(cx,cy+sy*s); ctx.closePath();
    ctx.fillStyle='rgba(0,0,0,.13)'; ctx.fill(); ctx.restore();
    // the folded flap (glossy black-plastic underside), nudged inward
    const o=7, q=s-5;
    ctx.save(); ctx.beginPath(); ctx.moveTo(cx+sx*o,cy+sy*o); ctx.lineTo(cx+sx*q,cy+sy*o); ctx.lineTo(cx+sx*o,cy+sy*q); ctx.closePath();
    const g=ctx.createLinearGradient(cx,cy,cx+sx*s,cy+sy*s); g.addColorStop(0,'#6a6a74'); g.addColorStop(.5,'#3a3a42'); g.addColorStop(1,'#24242a');
    ctx.fillStyle=g; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
  }
}

// ---------- judge (after all stencils peeled) ----------
function judge(){
  state='judging';
  const S=150; const tcx=mkS(S,targetCv), pcx=mkS(S,paintCv);
  const td=tcx.getImageData(0,0,S,S).data, pd=pcx.getImageData(0,0,S,S).data;
  const pal=STAGE.palette.map(h=>{h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];});
  const near=(d,i)=>{ if(d[i+3]<80)return -1; let bi=0,bd=1e9; for(let k=0;k<pal.length;k++){const dd=(d[i]-pal[k][0])**2+(d[i+1]-pal[k][1])**2+(d[i+2]-pal[k][2])**2; if(dd<bd){bd=dd;bi=k;}} return bi; };
  // per-PIXEL palette labels for target & paint
  const tl=new Int16Array(S*S), plab=new Int16Array(S*S);
  for(let p=0;p<S*S;p++){ tl[p]=near(td,p*4); plab[p]=near(pd,p*4); }
  // TRANSLATION-INVARIANT: align the painted picture to the target by content bbox top-left,
  // so drawing the same picture shifted left/right/up/down still passes (only relative arrangement matters).
  const bb=lab=>{ let mnx=S,mny=S,mxx=-1,mxy=-1; for(let y=0;y<S;y++)for(let x=0;x<S;x++){ if(lab[y*S+x]>=0){ if(x<mnx)mnx=x;if(x>mxx)mxx=x;if(y<mny)mny=y;if(y>mxy)mxy=y; } } return {mnx,mny,empty:mxx<0}; };
  const tb=bb(tl), pb=bb(plab);
  if(pb.empty){ setTimeout(()=>showResult(0,false),500); return; }
  const dtx=pb.mnx-tb.mnx, dty=pb.mny-tb.mny;   // painted picture is shifted by (dtx,dty) vs target
  // overall match % (translation-aligned): matched target pixels / total target pixels
  let gtot=0, gok=0;
  for(let y=0;y<S;y++)for(let x=0;x<S;x++){ const i=y*S+x; if(tl[i]<0)continue; gtot++; const sx=x+dtx, sy=y+dty; if(sx>=0&&sy>=0&&sx<S&&sy<S && plab[sy*S+sx]===tl[i]) gok++; }
  const overall = gtot? gok/gtot : 0;
  // per-component weakest-region match — HARD stages require EVERY region (so a buried/mis-ordered region fails)
  const comp=new Int32Array(S*S).fill(-1); let nc=0; const area=[],okc=[]; const stk=[];
  for(let s=0;s<S*S;s++){ if(comp[s]!==-1||tl[s]<0)continue; const id=nc++; area[id]=0;okc[id]=0; comp[s]=id; stk.push(s);
    while(stk.length){ const i=stk.pop(); area[id]++; const x=i%S,y=(i/S)|0, sx=x+dtx, sy=y+dty;
      if(sx>=0&&sy>=0&&sx<S&&sy<S && plab[sy*S+sx]===tl[i]) okc[id]++;
      if(x>0&&comp[i-1]===-1&&tl[i-1]===tl[i]){comp[i-1]=id;stk.push(i-1);}
      if(x<S-1&&comp[i+1]===-1&&tl[i+1]===tl[i]){comp[i+1]=id;stk.push(i+1);}
      if(y>0&&comp[i-S]===-1&&tl[i-S]===tl[i]){comp[i-S]=id;stk.push(i-S);}
      if(y<S-1&&comp[i+S]===-1&&tl[i+S]===tl[i]){comp[i+S]=id;stk.push(i+S);} } }
  // only SUBSTANTIAL regions count -> tiny edge mismatches don't false-fail a correct play,
  // but a large buried/mis-ordered region (wrong order) still tanks compMin.
  let compMin=1; for(let id=0;id<nc;id++){ if(area[id]<220)continue; const r=okc[id]/area[id]; if(r<compMin)compMin=r; }
  const win = overall>=0.8 && (DIFF!=='hard' || compMin>=0.42);   // hard: no large region may be buried
  // diff view: green where the painted picture matches the target, red where it's wrong (aligned)
  const diffCv=document.createElement('canvas'); diffCv.width=S; diffCv.height=S; const dcx=diffCv.getContext('2d'); const idata=dcx.createImageData(S,S);
  for(let y=0;y<S;y++)for(let x=0;x<S;x++){ const i=y*S+x, o=i*4; if(tl[i]<0){ idata.data[o+3]=0; continue; } const sx=x+dtx,sy=y+dty; const m=(sx>=0&&sy>=0&&sx<S&&sy<S&&plab[sy*S+sx]===tl[i]); idata.data[o]=m?78:235; idata.data[o+1]=m?198:84; idata.data[o+2]=m?120:84; idata.data[o+3]=255; }
  dcx.putImageData(idata,0,0); lastDiffURL=diffCv.toDataURL();
  setTimeout(()=> showResult(overall, win), 500);
}
let lastDiffURL='';
function mkS(S,src){const c=document.createElement('canvas');c.width=S;c.height=S;const x=c.getContext('2d');x.drawImage(src,0,0,S,S);return x;}
// >=80% = success. 100% -> NEXT only; 80-99% -> NEXT + RETRY; <80% -> RETRY only.
const WIN_LINES=['Cleared in one go!','Brilliant sense!','Masterful!','Flawless work!','You nailed it!','So satisfying!','Picture perfect!','A real artist!'];
const FAIL_LINES=['So close!','Almost had it!','Nearly there!','Don’t give up!','One more try!','Tantalizingly close!'];
const GOOD_LINES=['Nicely done!','Good thinking!','Well played!','Solid work!','Got it!'];
function pick(a){ return a[Math.floor(rand()*a.length)]; }
let rseed=1; function rand(){ rseed=(rseed*1103515245+12345)&0x7fffffff; return rseed/0x7fffffff; }   // (seed varied below)
// avg = average per-part score (0..100). >=100 perfect (NEXT). 80-99 pass (NEXT+RETRY). <80 fail (RETRY).
// dim layer with the user's finished drawing + a single ACCURACY %. >=80 pass, 100 perfect, <80 fail.
function showResult(){
  state='judging';
  // picture is always correct (auto-placed + order-gated) -> score = ORDER skill, by mistakes (wrong taps)
  const p=$('#popup'), stars = mistakes===0?3:(mistakes<=2?2:1), perfect = stars===3;
  rseed=(stageStart|0)+mistakes+stencils.length;   // vary praise per play
  const nextBtn = `<button class="btn" id="nx">${STAGE.next?'NEXT STAGE':'DONE'}</button>`;
  const retryBtn = `<button class="btn alt" id="rt">RETRY</button>`;
  const praise = perfect?pick(WIN_LINES):(stars===2?pick(GOOD_LINES):'Cleared it!');
  const draw=`<div class="rdraw"><img src="${paintCv.toDataURL()}"></div>`;
  const starRow = assets.starFull
    ? `<div class="stars">${[0,1,2].map(i=>`<img src="${assets.starFull}" class="${i<stars?'':'off'}">`).join('')}</div>`
    : `<div class="stars">${[0,1,2].map(i=>`<span class="${i<stars?'on':''}">★</span>`).join('')}</div>`;
  const sub = mistakes===0 ? 'No mistakes!' : `${mistakes} wrong tap${mistakes>1?'s':''}`;
  const btns = perfect?nextBtn:nextBtn+retryBtn;
  sfx('win'); if(navigator.vibrate)navigator.vibrate([20,40,20,40,40]); p.className='panel'; launchConfetti(perfect);
  p.innerHTML=`${draw}${starRow}<div class="praise">${praise}</div><p class="score">${sub}</p>${btns}`;
  $('#overlay').classList.add('show');
  const nx=$('#nx'); if(nx) nx.onclick=()=>{ if(STAGE.next)location.href=STAGE.next; else location.reload(); };
  const rt=$('#rt'); if(rt) rt.onclick=()=>location.reload();
}

// ---------- reference hold-to-zoom ----------
function setupRefZoom(){ const box=$('#refBox'); if(!box)return;
  const on=e=>{e.preventDefault();e.stopPropagation();box.classList.add('zoom');};
  const off=()=>box.classList.remove('zoom');
  box.addEventListener('pointerdown',on); window.addEventListener('pointerup',off); box.addEventListener('pointercancel',off); box.addEventListener('pointerleave',off);
}
function setHint(t){ const h=$('#hint'); if(!t){h.classList.add('hide');return;} h.textContent=t; h.classList.remove('hide'); }

// ---------- QA hooks (harmless in normal play) ----------
window.__qa={ state:()=>state,
  tap:(seq)=>{ const s=stencils.find(x=>x.seq===seq); if(!s||s.used)return 'gone'; const m0=mistakes; tryPlace(s); return s.used?'placed':(mistakes>m0?'rejected':'busy'); },  // simulate tapping a tray tile
  place:(seq)=>{ const s=stencils.find(x=>x.seq===seq); if(!s||s.used)return false; tryPlace(s); return s.used; },  // place if order is valid
  ready:(seq)=>{ const s=stencils.find(x=>x.seq===seq); return !!s&&isReady(s); },
  mistakes:()=>mistakes,
  result:()=>{ const ov=$('#overlay'); if(!ov||!ov.classList.contains('show'))return null; const p=$('#popup'),sc=p.querySelector('.score'),st=p.querySelectorAll('.stars img:not(.off), .stars span.on').length; return `WIN ${st}star ${sc?sc.textContent:''}`; },
  paintOrder:()=>stencils.map(s=>s.seq), dispOrder:()=>displayOrder.map(s=>s.seq) };
// ---------- developer mode: top-left toggle + jump between stages ----------
(function(){ const TOTAL=30, id=(typeof STAGE!=='undefined'&&STAGE.id)||1, dev=$('#dev');
  if(localStorage.getItem('ss_dev')==='1') dev.classList.add('on');
  $('#devLabel').textContent='STAGE '+id+' / '+TOTAL;
  $('#devToggle').onclick=()=>{ const now=!dev.classList.contains('on'); dev.classList.toggle('on',now); localStorage.setItem('ss_dev',now?'1':'0'); };
  const go=n=>{ n=Math.max(1,Math.min(TOTAL,n)); if(n===id)return; location.href=(n<=1?'index.html':'stage'+n+'.html'); };
  $('#devPrev').onclick=()=>go(id-1); $('#devNext').onclick=()=>go(id+1);
})();
