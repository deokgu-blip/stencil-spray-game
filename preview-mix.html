<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ink Layers — 색 혼합 퍼즐 프로토타입</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(120% 90% at 50% 16%,#7fb0bd 0%,#5c93a1 60%,#4e818e 100%);}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;}
  #title{margin-top:14px;color:#eaf6f4;font-weight:800;font-size:17px;letter-spacing:.3px;opacity:.92;}
  #hint{color:#dcefe9;font-size:13px;margin-top:2px;opacity:.8;font-weight:600;}
  .stars{display:flex;gap:7px;margin-top:8px;}
  .stars b{font-size:26px;color:#cfe0dd;}.stars b.on{color:#ffc534;text-shadow:0 2px 0 #e0921f;}
  #target{margin-top:10px;text-align:center;}
  #target .lab{color:#eaf6f4;font-size:12px;font-weight:700;opacity:.8;margin-bottom:4px;}
  #target canvas{width:150px;height:150px;border-radius:18px;background:#fff;box-shadow:0 8px 18px rgba(0,0,0,.22),inset 0 0 0 3px rgba(0,0,0,.05);}
  #boardWrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;}
  #board{width:330px;height:330px;border-radius:30px;background:#fff;box-shadow:0 16px 34px rgba(0,0,0,.26),inset 0 0 0 4px rgba(0,0,0,.05);}
  #tray{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;justify-content:center;padding:0 14px;}
  .ink{width:70px;height:84px;border-radius:18px;background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.3);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:transform .1s;}
  .ink:active{transform:scale(.92);}
  .ink .dot{width:40px;height:40px;border-radius:50%;box-shadow:inset 0 -3px 6px rgba(0,0,0,.15),0 2px 5px rgba(0,0,0,.2);}
  .ink .nm{color:#fff;font-size:12px;font-weight:800;}
  .ink.used{opacity:.45;}
  .ink.used .nm::after{content:' ✓';}
  #bar{display:flex;gap:10px;margin-bottom:12px;}
  .btn{padding:11px 22px;border:none;border-radius:22px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;
    background:linear-gradient(180deg,#56c294,#2f9e7e);box-shadow:0 5px 0 #237a61;}
  .btn.alt{background:linear-gradient(180deg,#f0a64e,#e0822f);box-shadow:0 5px 0 #b5651f;}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #237a61;}
  #toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.8);opacity:0;pointer-events:none;z-index:20;
    background:rgba(40,55,60,.94);color:#fff;font-weight:800;font-size:20px;padding:14px 26px;border-radius:30px;white-space:nowrap;}
  #toast.show{animation:tp 1.3s ease forwards;}
  @keyframes tp{0%{opacity:0;transform:translate(-50%,-50%) scale(.8);}14%{opacity:1;transform:translate(-50%,-60%) scale(1.05);}24%{transform:translate(-50%,-62%) scale(1);}76%{opacity:1;}100%{opacity:0;transform:translate(-50%,-72%) scale(.95);}}
  #win{position:fixed;inset:0;background:rgba(20,30,30,.6);display:none;align-items:center;justify-content:center;z-index:30;}
  #win.show{display:flex;}
  #winCard{background:linear-gradient(180deg,#fffef9,#fff5e9);border-radius:34px;padding:30px 36px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.4);}
  #winCard h2{color:#2f9e7e;font-size:30px;margin:6px 0;}
  #winCard p{color:#7a8a86;font-weight:700;margin-bottom:12px;}
  #winCard .stars b{font-size:46px;}
</style></head>
<body>
<div id="wrap">
  <div id="title">Ink Layers — 색을 겹쳐 목표를 만들어라</div>
  <div id="hint">잉크를 탭하면 칠해져요. 겹치면 색이 섞입니다. 필요한 잉크만 고르세요!</div>
  <div class="stars" id="starbar"><b class="on">★</b><b class="on">★</b><b class="on">★</b></div>
  <div id="target"><div class="lab">목표</div><canvas id="tcv" width="300" height="300"></canvas></div>
  <div id="boardWrap"><canvas id="board" width="660" height="660"></canvas></div>
  <div id="tray"></div>
  <div id="bar"><button class="btn alt" id="undo">↩ 되돌리기</button><button class="btn" id="reset">처음부터</button></div>
</div>
<div id="toast"></div>
<div id="win"><div id="winCard"><div class="stars" id="winStars"></div><h2 id="winTitle">완성!</h2><p id="winSub"></p><button class="btn" id="again">다시</button></div></div>
<script>
const $=s=>document.querySelector(s);
// ---- INKS: id, display name, color (multiply over white), and the shape it sprays through ----
// shapes are circles on a 660x660 board, arranged so they OVERLAP -> mixing.
const CX=330, R=142;
const INKS=[
  {id:'Y', nm:'Yellow',  col:[255,221,51],  cx:330, cy:235},   // top — underlies both overlaps
  {id:'C', nm:'Cyan',    col:[64,201,224],  cx:243, cy:392},   // lower-left  (Y∩C = green)
  {id:'M', nm:'Magenta', col:[232,70,150],  cx:417, cy:392},   // lower-right (Y∩M = orange)
  {id:'K', nm:'Indigo',  col:[70,80,180],   cx:330, cy:520},   // DECOY — its solo crescent (bottom) is NOT in the target
];
// SOLUTION: the target is made of Yellow + Cyan + Magenta (NOT the indigo decoy).
const SOLUTION=['Y','C','M'];

const board=$('#board'), bx=board.getContext('2d');
const tcv=$('#tcv'), tx=tcv.getContext('2d');
let applied=[], mistakes=0;

function paintInks(ctx, ids, scale){
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,ctx.canvas.width,ctx.canvas.height);
  // faint outlines of ALL ink shapes (so the player can see the zones) — only on the board
  if(scale===1 && ctx===bx){
    for(const ink of INKS){ ctx.save(); ctx.beginPath(); ctx.arc(ink.cx,ink.cy,R,0,7);
      ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=2; ctx.setLineDash([8,8]); ctx.stroke(); ctx.restore(); }
  }
  ctx.save(); ctx.globalCompositeOperation='multiply';
  for(const id of ids){ const ink=INKS.find(k=>k.id===id); if(!ink)continue;
    ctx.beginPath(); ctx.arc(ink.cx*scale,ink.cy*scale,R*scale,0,7);
    ctx.fillStyle=`rgb(${ink.col[0]},${ink.col[1]},${ink.col[2]})`; ctx.fill(); }
  ctx.restore();
}
function drawTarget(){ paintInks(tx, SOLUTION, 300/660); }
function redraw(){ paintInks(bx, applied, 1); }
function buildTray(){
  const t=$('#tray'); t.innerHTML='';
  for(const ink of INKS){
    const el=document.createElement('div'); el.className='ink'+(applied.includes(ink.id)?' used':'');
    el.innerHTML=`<div class="dot" style="background:rgb(${ink.col.join(',')})"></div><div class="nm">${ink.nm}</div>`;
    el.onclick=()=>tap(ink.id); t.appendChild(el);
  }
}
function toast(msg){ const e=$('#toast'); e.textContent=msg; e.classList.remove('show'); void e.offsetWidth; e.classList.add('show'); }
function updateStars(){ const cur=Math.max(1,3-mistakes); document.querySelectorAll('#starbar b').forEach((b,i)=>b.classList.toggle('on',i<cur)); }
function tap(id){
  if(applied.includes(id)) return;
  applied.push(id);
  if(!SOLUTION.includes(id)){ mistakes++; updateStars(); toast('이 잉크는 안 들어가요 🙂'); if(navigator.vibrate)navigator.vibrate([10,40,10]); }
  buildTray(); redraw(); check();
}
function setEq(a,b){ return a.length===b.length && a.every(x=>b.includes(x)); }
function check(){
  if(setEq(applied, SOLUTION)){
    const stars=Math.max(1,3-mistakes);
    $('#winStars').innerHTML=[0,1,2].map(i=>`<b class="${i<stars?'on':''}">★</b>`).join('');
    $('#winSub').textContent = mistakes===0?'딱 맞는 잉크만! 색을 정확히 읽었어요.':`${mistakes}번 잘못 섞었어요`;
    $('#winTitle').textContent = mistakes===0?'Perfect!':'완성!';
    setTimeout(()=>$('#win').classList.add('show'),350);
  }
}
$('#undo').onclick=()=>{ if(!applied.length)return; applied.pop(); buildTray(); redraw(); };
$('#reset').onclick=()=>{ applied=[]; mistakes=0; updateStars(); buildTray(); redraw(); };
$('#again').onclick=()=>{ $('#win').classList.remove('show'); applied=[]; mistakes=0; updateStars(); buildTray(); redraw(); };
drawTarget(); buildTray(); redraw();
window.__qa={ tap:(id)=>tap(id), state:()=>({applied:[...applied],mistakes,won:$('#win').classList.contains('show')}) };
</script>
</body></html>
